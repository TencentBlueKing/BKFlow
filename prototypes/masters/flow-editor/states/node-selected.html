<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流程编辑状态 - 节点已选中</title>
  <link rel="stylesheet" href="../../../assets/bkflow-prototype.css">
  <script defer src="../../../assets/bkflow-prototype.js"></script>
</head>
<body class="bk-flow-editor">
  <div class="bk-flow-editor-shell">
    <header class="bk-flow-editor-header">
      <div class="bk-flow-editor-meta">
        <a class="bk-flow-editor-back" href="#">← 返回流程列表</a>
        <div class="bk-flow-editor-title">
          <h1>编辑流程</h1>
          <p>audit-deep-dive-20260420 · 单击节点后的悬浮工具条</p>
        </div>
        <div class="bk-flow-version-area">
          <span class="bk-flow-version-label">流程版本</span>
          <span class="bk-tag">草稿</span>
          <span class="bk-flow-version-badge">最新发布 1.0.0</span>
        </div>
      </div>
      <div class="bk-flow-editor-actions">
        <button
          type="button"
          class="bk-button bk-button-primary bk-save-button is-disabled"
          id="flow-editor-save"
          disabled
          data-disable-target="#flow-editor-save"
          data-enable-target="#flow-editor-publish">保存</button>
        <button
          type="button"
          class="bk-button bk-button-primary is-disabled"
          id="flow-editor-publish"
          disabled
          data-open="flow-publish-dialog">发布</button>
        <button type="button" class="bk-button" data-open="flow-mock-debug-dialog">调试</button>
      </div>
    </header>

    <main class="bk-flow-editor-main">
      <aside class="bk-flow-editor-rail">
        <section class="bk-flow-section-card">
          <h2>状态说明</h2>
          <p>单击只改变节点选中态，抽屉仍保持关闭。</p>
        </section>
      </aside>

      <section class="bk-flow-canvas-shell">
        <div class="bk-flow-canvas-header">
          <div>
            <strong>流程画布</strong>
            <span>选中节点后展示节点悬浮工具条。</span>
          </div>
        </div>
        <div class="bk-flow-canvas">
          <div class="bk-flow-canvas-stage">
            <div class="bk-flow-node bk-flow-node-start"><strong>开始</strong></div>
            <div class="bk-flow-link"></div>
            <button type="button" class="bk-flow-node is-selected" data-node-select="flow-editor-main" data-node-toolbar="#flow-node-toolbar" data-node-name="发布蓝鲸作业" data-dblopen="flow-node-config-drawer">
              <strong>发布蓝鲸作业</strong>
              <span>标准插件 · 蓝盾作业</span>
            </button>
            <div class="bk-flow-link"></div>
            <button type="button" class="bk-flow-node" data-node-select="flow-editor-main" data-node-toolbar="#flow-node-toolbar" data-node-name="通知审批结果" data-dblopen="flow-node-config-drawer">
              <strong>通知审批结果</strong>
              <span>标准插件 · 通知中心</span>
            </button>
            <div class="bk-flow-link"></div>
            <div class="bk-flow-node bk-flow-node-end"><strong>结束</strong></div>
          </div>

          <div class="bk-flow-node-toolbar is-visible" id="flow-node-toolbar">
            <span class="bk-flow-toolbar-title" data-node-toolbar-label>发布蓝鲸作业</span>
            <button type="button" class="bk-flow-toolbar-button" data-open="flow-node-config-drawer">配置</button>
            <button type="button" class="bk-flow-toolbar-button">复制</button>
            <button type="button" class="bk-flow-toolbar-button">连线</button>
            <button type="button" class="bk-flow-toolbar-button">删除</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <aside class="bk-sideslider" id="flow-node-config-drawer">
    <div class="bk-sideslider-mask" data-close></div>
    <div class="bk-sideslider-content">
      <div class="bk-sideslider-header">
        <h3>节点配置</h3>
        <button class="bk-sideslider-close" data-close>×</button>
      </div>
    </div>
  </aside>

  <div class="bk-dialog" id="flow-publish-dialog">
    <div class="bk-dialog-mask" data-close></div>
    <div class="bk-dialog-content">
      <div class="bk-dialog-header">
        <h3>发布流程</h3>
        <button class="bk-dialog-close" data-close>×</button>
      </div>
    </div>
  </div>

  <div class="bk-dialog" id="flow-mock-debug-dialog">
    <div class="bk-dialog-mask" data-close></div>
    <div class="bk-dialog-content">
      <div class="bk-dialog-header">
        <h3>执行调试</h3>
        <button class="bk-dialog-close" data-close>×</button>
      </div>
    </div>
  </div>
</body>
</html>
